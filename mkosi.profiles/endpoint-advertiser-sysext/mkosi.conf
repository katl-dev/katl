[Output]
Format=sysext
Output=katl-endpoint-advertiser
ImageId=katl-endpoint-advertiser
Overlay=yes

[Content]
Bootable=no
BaseTrees=../../_build/mkosi/katl-runtime-root
Packages=
        bird
# Katl's unit uses DynamicUser= and its own runtime directory. Do not retain
# the generic package user's tmpfiles/sysusers hooks in the extension.
RemoveFiles=
        /usr/lib/sysusers.d/bird.conf
        /usr/lib/tmpfiles.d/bird.conf

[Build]
BuildSources=../..
WorkspaceDirectory=/tmp/katl-mkosi-endpoint-advertiser-workspace
