[Output]
Format=uki
Output=katl-installer
ImageId=katl-installer

[Content]
Bootable=yes
Bootloader=systemd-boot
UnifiedKernelImages=unsigned
Packages=
        # Boot stack and initrd userspace.
        kernel-core
        kernel-modules
        systemd
        systemd-boot-unsigned
        systemd-udev
        # Installer network, DNS, and remote access.
        systemd-networkd
        systemd-resolved
        openssh-server
        ca-certificates
        curl
        # Disk formatting, filesystem, and shell basics for katlos-install.
        util-linux
        parted
        iproute
        e2fsprogs
        dosfstools
        coreutils
        bash
KernelCommandLine=console=ttyS0,115200n8 systemd.log_target=console loglevel=6
Hostname=katl-installer
Autologin=yes
MakeInitrd=yes

[Build]
BuildSources=../..
WorkspaceDirectory=/tmp/katl-mkosi-installer-workspace
