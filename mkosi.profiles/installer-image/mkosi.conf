[Output]
Format=uki
Output=katl-installer
ImageId=katl-installer
CompressOutput=zstd
CompressLevel=22

[Content]
Bootable=yes
Bootloader=systemd-boot
UnifiedKernelImages=unsigned
Packages=
        # Boot stack and initrd userspace.
        kernel-core
        kernel-modules
        systemd
        systemd-boot-unsigned
        systemd-udev
        # Installer network, DNS, and remote access.
        systemd-networkd
        systemd-resolved
        openssh-server
        ca-certificates
        curl
        # Disk formatting, filesystem, and shell basics for katlos-install.
        util-linux
        parted
        iproute
        e2fsprogs
        dosfstools
        coreutils
        bash
        # Pin mirror-sensitive trust packages used by the release lock.
        libacl-0:2.3.2-6.fc44.x86_64
        libattr-0:2.5.2-8.fc44.x86_64
        p11-kit-0:0.26.2-1.fc44.x86_64
        p11-kit-trust-0:0.26.2-1.fc44.x86_64
# Keep the installer focused on boot, disk, filesystem, wired-network, and
# common server hardware. Runtime images retain Fedora's broad module set.
KernelModules=
        /arch/x86/
        /crypto/
        /drivers/acpi/
        /drivers/ata/
        /drivers/block/
        /drivers/cdrom/
        /drivers/char/
        /drivers/hid/
        /drivers/hv/
        /drivers/input/
        /drivers/md/
        /drivers/message/
        /drivers/net/ethernet/
        /drivers/net/hyperv/
        /drivers/net/mdio/
        /drivers/net/phy/
        /drivers/net/virtio_net
        /drivers/net/vmxnet3/
        /drivers/nvme/
        /drivers/pci/
        /drivers/scsi/
        /drivers/usb/
        /drivers/vhost/
        /drivers/virtio/
        /drivers/video/
        /fs/ext4/
        /fs/fat/
        /fs/isofs/
        /fs/nls/nls_cp437
        /fs/nls/nls_iso8859-1
        /fs/squashfs/
        /fs/udf/
        /fs/xfs/
        /lib/
# Remove unsupported operator entrypoints and package-manager metadata that
# arrive through retained Fedora packages.
RemoveFiles=
        /buildroot/var/lib/dnf
        /etc/dnf
        /etc/yum.repos.d
        /run/dnf
        /usr/bin/pkg-config
        /usr/bin/pkgconf
        /usr/lib/modules/*/System.map
        /usr/lib/modules/*/vmlinuz
        /usr/lib/rpm
        /usr/share/dnf5
        /usr/share/licenses/pkgconf
        /var/lib/rpm-state
KernelCommandLine=console=ttyS0,115200n8 console=tty0 systemd.log_target=console loglevel=6 rd.systemd.unit=katl-installer.target
Hostname=katl-installer
Autologin=yes
MakeInitrd=yes

[Build]
BuildSources=../..
WorkspaceDirectory=/tmp/katl-mkosi-installer-workspace
