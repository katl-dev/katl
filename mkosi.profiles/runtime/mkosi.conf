[Output]
Format=directory
Output=katl-runtime-root
ImageId=katl-runtime

[Content]
Bootable=no
Packages=
        # Runtime boot, kernel modules, and initramfs tooling.
        kernel-core
        kernel-modules
        dracut
        systemd
        systemd-container
        systemd-udev
        dbus-broker
        # Host networking and service access.
        systemd-networkd
        systemd-resolved
        openssh-server
        ca-certificates
        util-linux
        iproute
        kmod
        nftables
        conntrack-tools
        iptables-nft
        ipset
        ipvsadm
        # Container host plumbing; Kubernetes packages live in the sysext.
        containerd
        crun
        containernetworking-plugins
        # Minimal shell and core userspace expected by systemd units and operators.
        coreutils
        bash
        # Pin mirror-sensitive trust packages used by the release lock.
        libacl-0:2.3.2-6.fc44.x86_64
        libattr-0:2.5.2-8.fc44.x86_64
        p11-kit-0:0.26.2-1.fc44.x86_64
        p11-kit-trust-0:0.26.2-1.fc44.x86_64
# Remove unsupported operator entrypoints that arrive through retained packages.
RemoveFiles=
        /etc/yum.repos.d
        /usr/bin/machinectl
        /usr/bin/pkg-config
        /usr/bin/pkgconf
        /usr/bin/systemd-nspawn
        /usr/lib/systemd/system/dbus-org.freedesktop.machine1.service
        /usr/lib/systemd/system/machine.slice
        /usr/lib/systemd/system/machines.target
        /usr/lib/systemd/system/machines.target.wants
        /usr/lib/systemd/system/nftables.service
        /usr/lib/systemd/system/remote-fs.target.wants/var-lib-machines.mount
        /usr/lib/systemd/system/sockets.target.wants/systemd-machined.socket
        /usr/lib/systemd/system/systemd-machined.service
        /usr/lib/systemd/system/systemd-machined.socket
        /usr/lib/systemd/system/systemd-nspawn@.service
        /usr/lib/systemd/system/var-lib-machines.mount
Hostname=katl-runtime

[Build]
BuildSources=../..
WorkspaceDirectory=/tmp/katl-mkosi-runtime-workspace
