syntax = "proto3";

package katl.agent.v1;

option go_package = "github.com/katl-dev/katl/internal/katlc/agentapi;agentapi";

service KatlcAgent {
  rpc GetNodeStatus(GetNodeStatusRequest) returns (NodeStatus);
  rpc ValidateConfig(ValidateConfigRequest) returns (ConfigValidationResult);
  rpc ApplyGeneration(GenerationApplyRequest) returns (OperationAccepted);
  rpc StageGeneration(GenerationApplyRequest) returns (OperationAccepted);
  rpc SubmitOperation(SubmitOperationRequest) returns (OperationAccepted);
  rpc CreateWorkerJoinMaterial(CreateWorkerJoinMaterialRequest) returns (CreateWorkerJoinMaterialResponse);
  rpc GetOperation(GetOperationRequest) returns (OperationStatus);
  rpc ListOperations(ListOperationsRequest) returns (ListOperationsResponse);
  rpc WatchOperation(WatchOperationRequest) returns (stream OperationEvent);
  rpc ListGenerations(ListGenerationsRequest) returns (ListGenerationsResponse);
  rpc GetGeneration(GetGenerationRequest) returns (Generation);
}

message GetNodeStatusRequest {}

message NodeStatus {
  string api_version = 1;
  string machine_id = 2;
  string agent_start_id = 3;
  string agent_started_at = 4;
  repeated string supported_api_versions = 5;
  repeated string supported_operation_kinds = 6;
  bool operation_lock_held = 7;
  repeated string active_operation_ids = 8;
  string current_generation_id = 9;
}

message SubmitOperationRequest {
  string api_version = 1;
  string kind = 2;
  string client_request_id = 3;
  string operation_kind = 4;
  string actor = 5;
  string expected_machine_id = 6;
  string expected_current_generation_id = 7;
  string expected_cluster_intent_digest = 8;
  string request_digest = 9;
  bool dry_run = 10;
  string operation_timeout = 11;
  BootstrapOperationRequest bootstrap = 12;
  ConfigApplyOperationRequest config_apply = 13;
  KubernetesSysextUpdateOperationRequest kubernetes_sysext_update = 14;
  DestructiveResetOperationRequest destructive_reset = 15;
  HostUpgradeOperationRequest host_upgrade = 16;
  KubeadmControlPlaneConfigOperationRequest kubeadm_control_plane_config = 17;
}

message BootstrapOperationRequest {
  string inventory_node_name = 1;
  string system_role = 2;
  string kubernetes_payload_version = 3;
  string bootstrap_profile_ref = 4;
  string control_plane_endpoint = 5;
  string stable_endpoint = 6;
  string candidate_generation_id = 7;
  string kubeadm_input_digest = 8;
  string join_material_ref = 9;
  WorkerJoinMaterial worker_join_material = 10;
  string kubernetes_bundle_source = 11;
  string kubernetes_bundle_ref = 12;
}

message WorkerJoinMaterial {
  repeated string join_argv = 1;
  string expires_at = 2;
}

message ValidateConfigRequest {
  string api_version = 1;
  string kind = 2;
  string actor = 3;
  string expected_machine_id = 4;
  string expected_current_generation_id = 5;
  string apply_mode = 6;
  string candidate_generation_id = 7;
  string node_name = 8;
  string config_yaml = 9;
  string client_request_id = 10;
  string operation_timeout = 11;
}

message ConfigValidationResult {
  string api_version = 1;
  string kind = 2;
  bool accepted = 3;
  string request_digest = 4;
  string requested_apply_mode = 5;
  string accepted_apply_mode = 6;
  string candidate_generation_id = 7;
  repeated string changed_domains = 8;
  repeated string diagnostics = 9;
  string failure_reason = 10;
}

message GenerationApplyRequest {
  string api_version = 1;
  string kind = 2;
  string client_request_id = 3;
  string actor = 4;
  string expected_machine_id = 5;
  string expected_current_generation_id = 6;
  string request_digest = 7;
  string operation_timeout = 8;
  string candidate_generation_id = 9;
  string node_name = 10;
  string config_yaml = 11;
}

message ConfigApplyOperationRequest {
  string candidate_generation_id = 1;
  string apply_mode = 2;
  string node_name = 3;
  string config_yaml = 4;
}

message KubeadmControlPlaneConfigOperationRequest {
  string rollout_id = 1;
  uint32 node_position = 2;
  uint32 node_count = 3;
  string coordinator_node = 4;
  bool coordinator_upload = 5;
  string desired_generation_id = 6;
  string config_name = 7;
  string desired_config_sha256 = 8;
  string expected_live_config_sha256 = 9;
  string kubernetes_payload_version = 10;
  string kubernetes_payload_sha256 = 11;
  repeated string supported_field_delta = 12;
  string snapshot_ref = 13;
  string snapshot_digest = 14;
  string snapshot_revision = 15;
  string captured_member_list_digest = 16;
  string source_etcd_version = 17;
  string snapshot_created_at = 18;
  string snapshot_storage_location = 19;
  string snapshot_operator_identity = 20;
  string node_name = 21;
}

message KubernetesSysextUpdateOperationRequest {
  string target_payload_version = 1;
  string target_sysext_path = 2;
  string target_sysext_sha256 = 3;
  uint64 target_sysext_size_bytes = 4;
  string target_activation_path = 5;
  string candidate_generation_id = 6;
  string upgrade_role = 7;
  string source_payload_version = 8;
  string snapshot_ref = 9;
  string snapshot_digest = 10;
  string snapshot_revision = 11;
  string snapshot_created_at = 12;
  string captured_member_list_digest = 13;
  string source_etcd_version = 14;
  string snapshot_storage_location = 15;
  string snapshot_operator_identity = 16;
  string kubernetes_bundle_source = 17;
  string kubernetes_bundle_ref = 18;
  string kubernetes_bundle_manifest_digest = 19;
}

message DestructiveResetOperationRequest {
  string inventory_node_name = 1;
  string reset_scope = 2;
  string target_generation_id = 3;
  bool discard_cluster_identity = 4;
  repeated string wipe_surfaces = 5;
}

message HostUpgradeOperationRequest {
  string image_url = 1;
  string image_local_ref = 2;
  string image_sha256 = 3;
  uint64 image_size_bytes = 4;
  string candidate_generation_id = 5;
}

message CreateWorkerJoinMaterialRequest {
  string api_version = 1;
  string kind = 2;
  string actor = 3;
  string expected_machine_id = 4;
  string request_ref = 5;
  string ttl = 6;
}

message CreateWorkerJoinMaterialResponse {
  string material_ref = 1;
  WorkerJoinMaterial worker_join_material = 2;
  string created_at = 3;
}

message OperationAccepted {
  string operation_id = 1;
  string operation_kind = 2;
  string request_digest = 3;
  string record_path = 4;
  string accepted_at = 5;
  OperationStatus initial_status = 6;
}

message GetOperationRequest {
  string operation_id = 1;
  string expected_request_digest = 2;
  string include_diagnostics = 3;
}

message ListOperationsRequest {
  bool active_only = 1;
  int32 limit = 2;
  string include_diagnostics = 3;
}

message ListOperationsResponse {
  repeated OperationStatus operations = 1;
}

message OperationStatus {
  string operation_id = 1;
  string operation_kind = 2;
  string request_digest = 3;
  string phase = 4;
  int32 phase_index = 5;
  repeated string completed_phases = 6;
  bool terminal = 7;
  string result = 8;
  string candidate_generation_id = 9;
  bool external_mutation_started = 10;
  repeated string mutation_scopes = 11;
  repeated string resource_locks = 12;
  int32 latest_journal_seq = 13;
  string updated_at = 14;
  string next_action = 15;
  repeated DiagnosticArtifact diagnostics = 16;
  bool recovery_required = 17;
  string failure_reason = 18;
  repeated OperationInvocation invocations = 19;
  string activation_mode = 20;
  string activation_state = 21;
  string generation_commit_state = 22;
  string post_kubeadm_health_state = 23;
  bool boot_health_pending = 24;
  string admin_kubeconfig = 25;
  string previous_generation_id = 26;
  string config_apply_phase = 27;
  repeated string changed_domains = 28;
}

message DiagnosticArtifact {
  string artifact_id = 1;
  string path = 2;
  string sha256 = 3;
  bool redacted = 4;
  string created_at = 5;
}

message OperationInvocation {
  string invocation_id = 1;
  string agent_start_id = 2;
  string executor_attempt_id = 3;
  repeated string child_process = 4;
  int32 pid = 5;
  int32 exit_status = 6;
  string started_at = 7;
  string completed_at = 8;
  string result = 9;
}

message WatchOperationRequest {
  string operation_id = 1;
  string expected_request_digest = 2;
  int32 after_journal_seq = 3;
  string watch_timeout = 4;
  string include_diagnostics = 5;
}

message OperationEvent {
  string operation_id = 1;
  int32 journal_seq = 2;
  string event_type = 3;
  string phase = 4;
  bool terminal = 5;
  OperationStatus status = 6;
  repeated DiagnosticArtifact diagnostics = 7;
}

message ListGenerationsRequest {
  bool include_config_apply = 1;
}

message ListGenerationsResponse {
  repeated Generation generations = 1;
}

message GetGenerationRequest {
  string generation_id = 1;
  bool include_config_apply = 2;
}

message Generation {
  string generation_id = 1;
  string runtime_version = 2;
  string previous_generation_id = 3;
  string commit_state = 4;
  string boot_state = 5;
  string health_state = 6;
  string spec_digest = 7;
  string created_at = 8;
  string updated_at = 9;
  repeated ExtensionRef sysexts = 10;
  repeated GeneratedConfext confexts = 11;
  ConfigApplyStatus config_apply = 12;
}

message ExtensionRef {
  string name = 1;
  string path = 2;
  string activation_path = 3;
  string sha256 = 4;
  string artifact_version = 5;
  string payload_version = 6;
  string architecture = 7;
}

message GeneratedConfext {
  string name = 1;
  string path = 2;
  string activation_path = 3;
  string sha256 = 4;
}

message ConfigApplyStatus {
  string phase = 1;
  string requested_apply_mode = 2;
  string accepted_apply_mode = 3;
  repeated string changed_domains = 4;
  string failure_reason = 5;
  bool kubeadm_action_required = 6;
  string previous_kubeadm_config_name = 7;
  string selected_kubeadm_config_name = 8;
}
