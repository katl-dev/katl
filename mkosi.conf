[Config]
MinimumVersion=26

[Distribution]
Distribution=fedora
Release=44
Architecture=x86-64
RepositoryKeyFetch=yes

[Output]
Format=disk
Output=katl-installer
OutputDirectory=build/mkosi
CompressOutput=no
ImageId=katl-installer

[Content]
Bootable=yes
Bootloader=systemd-boot
UnifiedKernelImages=unsigned
Packages=
        kernel-core
        kernel-modules
        systemd
        systemd-boot-unsigned
        systemd-udev
        util-linux
        coreutils
        bash
WithDocs=no
WithRecommends=no
KernelCommandLine=console=ttyS0,115200n8 systemd.log_target=console loglevel=6
Hostname=katl-installer
Autologin=yes

[Build]
Incremental=yes
RepartOffline=yes
BuildSources=
WorkspaceDirectory=build/mkosi/workspace
CacheDirectory=build/mkosi/cache
PackageCacheDirectory=build/mkosi/package-cache
BuildDirectory=build/mkosi/builddir
