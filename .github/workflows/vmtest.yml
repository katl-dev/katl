name: VM Tests

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  libvirt:
    name: ${{ matrix.gate.name }}
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (vars.KATL_VMTEST_PR_ENABLED == '1' &&
       !github.event.pull_request.draft &&
       github.event.pull_request.head.repo.full_name == github.repository)
    runs-on:
      - self-hosted
      - linux
      - x64
      - katl-vmtest
      - libvirt
      - kvm
      - ovmf
      - vsock
    timeout-minutes: ${{ matrix.gate.timeout_minutes }}

    strategy:
      fail-fast: true
      max-parallel: 1
      matrix:
        gate:
          - id: direct-runtime
            name: Direct Runtime VM
            artifact_set: runtime
            package: ./internal/vmtest
            run: ^TestDirectRuntimeVMTestAgentSmoke$
            go_timeout: 20m
            timeout_minutes: 45
          - id: first-install
            name: First Install VM
            artifact_set: default
            package: ./internal/vmtest
            run: ^TestFirstInstallTargetDiskSerialSmoke$
            go_timeout: 35m
            timeout_minutes: 70
          - id: installed-runtime
            name: Installed Runtime VM
            artifact_set: default
            package: ./internal/vmtest
            run: ^(TestInstalledRuntimeKubeadmReadySmoke|TestInstalledRuntimeConfigApplyModesSmoke)$
            go_timeout: 45m
            timeout_minutes: 85
          - id: two-node-bootstrap
            name: Two-Node Bootstrap VM
            artifact_set: default
            package: ./internal/vmtest/scenarios
            run: ^TestInstalledRuntimeTwoNodeKubeadmJoinSmoke$
            go_timeout: 60m
            timeout_minutes: 110

    env:
      GOTOOLCHAIN: auto
      KATL_VMTEST_KVM: "on"
      KATL_VMTEST_KEEP: always
      KATL_VMTEST_DEBUG_ON_FAILURE: "0"
      KATL_VMTEST_REQUIRE_SCENARIO_RESULT: "1"
      KATL_VMTEST_RUN_ID: gha-${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.gate.id }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set vmtest run directory
        shell: bash
        run: echo "KATL_VMTEST_RUN_DIR=$RUNNER_TEMP/katl-vmtest/${{ matrix.gate.id }}" >> "$GITHUB_ENV"

      - name: Declare runner capabilities
        shell: bash
        run: |
          {
            echo "## VM runner capabilities"
            echo
            echo "Required runner labels: self-hosted, linux, x64, katl-vmtest, libvirt, kvm, ovmf, vsock."
            echo
            echo "The job fails when a declared capability is missing. Host-skipped scenario results are reserved for declared runner capability gaps recorded by the vmtest world."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Preflight capable host
        shell: bash
        run: |
          if ! command -v nix >/dev/null 2>&1; then
            printf 'VM capable-host preflight failed:\n'
            printf '  - command:nix\n'
            exit 1
          fi
          nix develop .#vm -c bash -s <<'EOF'
          set -euo pipefail
          missing=()
          for tool in jq virsh qemu-img mformat mcopy truncate sfdisk sha256sum awk realpath kubectl; do
            if ! command -v "$tool" >/dev/null 2>&1; then
              missing+=("command:$tool")
            fi
          done

          if [ ! -e "${KATL_VMTEST_KVM_DEVICE:-/dev/kvm}" ]; then
            missing+=("device:${KATL_VMTEST_KVM_DEVICE:-/dev/kvm}")
          fi
          if [ ! -e "${KATL_VMTEST_VSOCK_DEVICE:-/dev/vhost-vsock}" ]; then
            missing+=("device:${KATL_VMTEST_VSOCK_DEVICE:-/dev/vhost-vsock}")
          fi
          if [ ! -e /dev/net/tun ]; then
            missing+=("device:/dev/net/tun")
          fi
          if [ -z "${KATL_OVMF_CODE:-}" ] || [ ! -r "${KATL_OVMF_CODE:-}" ]; then
            missing+=("env:KATL_OVMF_CODE")
          fi
          if [ -z "${KATL_OVMF_VARS:-}" ] || [ ! -r "${KATL_OVMF_VARS:-}" ]; then
            missing+=("env:KATL_OVMF_VARS")
          fi

          libvirt_uri="${KATL_VMTEST_LIBVIRT_URI:-qemu:///system}"
          libvirt_network="${KATL_VMTEST_LIBVIRT_NETWORK:-default}"
          libvirt_pool="${KATL_VMTEST_LIBVIRT_STORAGE_POOL:-default}"

          if command -v virsh >/dev/null 2>&1; then
            if ! virsh -c "$libvirt_uri" uri >/dev/null 2>&1; then
              missing+=("libvirt:$libvirt_uri")
            else
              if ! virsh -c "$libvirt_uri" net-info "$libvirt_network" 2>/dev/null | grep -Eq '^Active:[[:space:]]+yes'; then
                missing+=("libvirt-network:$libvirt_network")
              fi
              if ! virsh -c "$libvirt_uri" pool-info "$libvirt_pool" 2>/dev/null | grep -Eq '^State:[[:space:]]+running'; then
                missing+=("libvirt-storage-pool:$libvirt_pool")
              fi
            fi
          fi

          if [ "${#missing[@]}" -ne 0 ]; then
            printf 'VM capable-host preflight failed:\n'
            printf '  - %s\n' "${missing[@]}"
            exit 1
          fi
          EOF

      - name: Run ${{ matrix.gate.name }}
        shell: bash
        run: |
          nix develop .#vm -c env \
            KATL_VMTEST_RUN_ID="$KATL_VMTEST_RUN_ID" \
            KATL_VMTEST_RUN_DIR="$KATL_VMTEST_RUN_DIR" \
            KATL_VMTEST_KVM="$KATL_VMTEST_KVM" \
            KATL_VMTEST_KEEP="$KATL_VMTEST_KEEP" \
            KATL_VMTEST_DEBUG_ON_FAILURE="$KATL_VMTEST_DEBUG_ON_FAILURE" \
            KATL_VMTEST_REQUIRE_SCENARIO_RESULT="$KATL_VMTEST_REQUIRE_SCENARIO_RESULT" \
            KATL_OVMF_CODE="${KATL_OVMF_CODE:-}" \
            KATL_OVMF_VARS="${KATL_OVMF_VARS:-}" \
            KATL_VMTEST_LIBVIRT_URI="${KATL_VMTEST_LIBVIRT_URI:-}" \
            KATL_VMTEST_LIBVIRT_NETWORK="${KATL_VMTEST_LIBVIRT_NETWORK:-}" \
            KATL_VMTEST_LIBVIRT_STORAGE_POOL="${KATL_VMTEST_LIBVIRT_STORAGE_POOL:-}" \
            KATL_VMTEST_KVM_DEVICE="${KATL_VMTEST_KVM_DEVICE:-}" \
            KATL_VMTEST_VSOCK_DEVICE="${KATL_VMTEST_VSOCK_DEVICE:-}" \
            scripts/vmtest-run \
            --artifact-set="${{ matrix.gate.artifact_set }}" \
            "${{ matrix.gate.package }}" \
            -run '${{ matrix.gate.run }}' \
            -count=1 \
            -failfast \
            -timeout '${{ matrix.gate.go_timeout }}'

      - name: Upload vmtest artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vmtest-${{ matrix.gate.id }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            ${{ env.KATL_VMTEST_RUN_DIR }}/
            !${{ env.KATL_VMTEST_RUN_DIR }}/**/*.qcow2
            !${{ env.KATL_VMTEST_RUN_DIR }}/**/*.raw
            !${{ env.KATL_VMTEST_RUN_DIR }}/**/*.img
          if-no-files-found: warn
          retention-days: 14

      - name: Clean vmtest run directory
        if: always()
        shell: bash
        run: |
          if [ -d "$KATL_VMTEST_RUN_DIR" ]; then
            scripts/vmtest-clean "$KATL_VMTEST_RUN_DIR" || true
            rm -rf -- "$KATL_VMTEST_RUN_DIR"
          fi
